openapi: 3.0.0
info:
  title: Zinda Learn REST API Backend
  version: 1.0.0
  description: API Documentation for MERN LMS Portal backend. Serving student profiles, teachers settings, courses registration, live classes stream endpoints, OTP logins, and payment integrations.
servers:
  - url: http://localhost:5005
    description: Development server
tags:
  - name: Auth
    description: Student and Tutor session credentials and profile settings operations.
  - name: Users
    description: General profile search and validation operations.
  - name: Students
    description: Student activities, certificates, progress trackers, and settings.
  - name: Teachers
    description: Instructor specific payouts, stats, profile modifications, and settings.
  - name: Courses
    description: Curriculum creation, sections listing, and reviews comments.
  - name: Enrollments
    description: Student courses enrollment history and progress updates.
  - name: Payments
    description: Razorpay and withdrawal order transactions details.
  - name: Certificates
    description: Issued credentials and achievement ratings.
  - name: Messages
    description: Realtime dialogue messaging details.
  - name: Notifications
    description: Realtime updates notifications logs.
  - name: Live Classes
    description: WebRTC video and classroom scheduled meetings.
  - name: Video Calls
    description: Direct dynamic video links and tokens.
  - name: Admin
    description: Privileged operations for platform administration.
  - name: Dashboard
    description: Dashboard progress graphs and aggregate analytics metrics.
  - name: Public
    description: Unprotected endpoints visible to landing pages.
  - name: Uploads
    description: Multipart files and assets uploads.
  - name: Settings
    description: Notification settings and configurations toggles.
paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user profile with student or instructor roles.
      parameters: []
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Operation executed successfully
                  data:
                    type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
                role:
                  type: string
                  enum:
                    - student
                    - instructor
                  example: student
              required:
                - name
                - email
                - password
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Authenticate using email and password to receive a JWT.
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
