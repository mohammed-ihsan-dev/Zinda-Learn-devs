components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error occurred
    User:
      type: object
      properties:
        id:
          type: string
          example: usr_60b73c4f7b2a92120e29ba1c
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        role:
          type: string
          enum:
            - student
            - instructor
            - admin
          example: student
        isBlocked:
          type: boolean
          example: false
        profilePic:
          type: string
          example: https://cloudinary.com/avatar.jpg
        avatar:
          type: string
          example: https://cloudinary.com/avatar.jpg
        isVerified:
          type: boolean
          example: true
        bio:
          type: string
          example: Full stack web developer.
        phone:
          type: string
          example: '+919876543210'
        isApproved:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2026-06-22T12:00:00Z'
    Student:
      type: object
      description: User details tailored with Student fields
      properties:
        id:
          type: string
          example: usr_student123
        name:
          type: string
          example: Alice Student
        email:
          type: string
          format: email
          example: alice@student.com
        role:
          type: string
          example: student
        enrolledCourses:
          type: array
          items:
            type: string
          example:
            - course1
            - course2
        wishlist:
          type: array
          items:
            type: string
          example:
            - course3
        hoursLearned:
          type: number
          example: 12.5
        points:
          type: number
          example: 150
        preferences:
          type: object
          properties:
            darkMode:
              type: boolean
              example: false
            videoQuality:
              type: string
              example: 1080p
    Teacher:
      type: object
      description: User details tailored with Instructor fields
      properties:
        id:
          type: string
          example: usr_tutor123
        name:
          type: string
          example: Robert Instructor
        email:
          type: string
          format: email
          example: robert@teacher.com
        role:
          type: string
          example: instructor
        bio:
          type: string
          example: Senior Web Architect with 10 years experience.
        isApproved:
          type: boolean
          example: true
        socialLinks:
          type: object
          properties:
            website:
              type: string
              example: https://robert.dev
            linkedin:
              type: string
              example: https://linkedin.com/in/robert
        paymentDetails:
          type: object
          properties:
            preferredMethod:
              type: string
              example: upi
            upi:
              type: object
              properties:
                upiId:
                  type: string
                  example: robert@okaxis
    Course:
      type: object
      properties:
        id:
          type: string
          example: crs_102
        title:
          type: string
          example: Advanced Node.js Architecture
        slug:
          type: string
          example: advanced-node-js-architecture
        description:
          type: string
          example: Learn clean code, patterns, testing, and production clustering.
        price:
          type: number
          example: 3499
        discountPrice:
          type: number
          example: 1999
        category:
          type: string
          example: development
        level:
          type: string
          example: Advanced
        language:
          type: string
          example: English
        instructor:
          type: string
          example: usr_tutor123
        isPublished:
          type: boolean
          example: true
        status:
          type: string
          example: published
        rating:
          type: number
          example: 4.8
        totalRatings:
          type: number
          example: 42
    Enrollment:
      type: object
      properties:
        id:
          type: string
          example: enr_402
        user:
          type: string
          example: usr_student123
        course:
          type: string
          example: crs_102
        progress:
          type: number
          example: 45
        completedLessons:
          type: array
          items:
            type: string
          example:
            - les_1
            - les_2
        isCompleted:
          type: boolean
          example: false
        paymentStatus:
          type: string
          example: completed
        amountPaid:
          type: number
          example: 1999
    Payment:
      type: object
      properties:
        id:
          type: string
          example: pay_902
        user:
          type: string
          example: usr_student123
        course:
          type: string
          example: crs_102
        amount:
          type: number
          example: 1999
        currency:
          type: string
          example: INR
        razorpayOrderId:
          type: string
          example: order_Kp9tB2jD1k9pLw
        status:
          type: string
          example: completed
    Certificate:
      type: object
      properties:
        id:
          type: string
          example: cert_102
        student:
          type: string
          example: usr_student123
        course:
          type: string
          example: crs_102
        certificateId:
          type: string
          example: ZL-CERT-74F9A
        issueDate:
          type: string
          format: date-time
          example: '2026-06-22T18:00:00Z'
        credentialUrl:
          type: string
          example: https://cloudinary.com/certs/ZL-CERT-74F9A.pdf
    Message:
      type: object
      properties:
        id:
          type: string
          example: msg_201
        sender:
          type: string
          example: usr_student123
        conversationId:
          type: string
          example: conv_802
        content:
          type: string
          example: When is the project deadline?
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-06-22T18:15:00Z'
    Notification:
      type: object
      properties:
        id:
          type: string
          example: not_502
        recipient:
          type: string
          example: usr_student123
        type:
          type: string
          example: live_class_reminder
        message:
          type: string
          example: Live Q&A session starts in 15 minutes.
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-06-22T18:00:00Z'
    LiveClass:
      type: object
      properties:
        id:
          type: string
          example: live_802
        course:
          type: string
          example: crs_102
        title:
          type: string
          example: WebRTC Live Video Call Implementation
        scheduledTime:
          type: string
          format: date-time
          example: '2026-06-25T15:00:00.000Z'
        duration:
          type: number
          example: 60
        meetingId:
          type: string
          example: mtg-920-102-120
        passcode:
          type: string
          example: '990321'
        status:
          type: string
          example: scheduled
    VideoCall:
      type: object
      properties:
        id:
          type: string
          example: call_902
        caller:
          type: string
          example: usr_tutor123
        receiver:
          type: string
          example: usr_student123
        channelName:
          type: string
          example: room_902
        status:
          type: string
          example: completed
        startTime:
          type: string
          format: date-time
          example: '2026-06-22T15:00:00Z'
        endTime:
          type: string
          format: date-time
          example: '2026-06-22T15:30:00Z'
    Admin:
      type: object
      description: System Admin profile details
      properties:
        id:
          type: string
          example: usr_admin99
        name:
          type: string
          example: Super Administrator
        email:
          type: string
          format: email
          example: admin@zindalearn.com
        role:
          type: string
          example: admin
