# ============================================================
# Nginx Site Config — Zinda Learn (EC2 + PM2 Deployment)
# File: /etc/nginx/sites-available/zinda-learn
# Symlink: /etc/nginx/sites-enabled/zinda-learn
#
# Architecture:
#   Browser → Nginx:443 (HTTPS)
#     ├── /api/*       → proxy → Node.js:5005
#     ├── /socket.io/* → proxy → Node.js:5005 (WebSocket upgrade)
#     └── /*           → static React dist/ (SPA fallback to index.html)
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name zinda-learn.com www.zinda-learn.com;

    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zinda-learn.com www.zinda-learn.com;

    # ── SSL (Certbot managed) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/zinda-learn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zinda-learn.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── API reverse proxy → Node.js backend ──────────────────
    # THIS IS THE CRITICAL BLOCK that was missing — proxies /api/* to the backend.
    location /api/ {
        proxy_pass         http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — increase for long-running operations (uploads, AI, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Disable proxy buffering for streaming responses
        proxy_buffering off;
    }

    # ── Socket.IO reverse proxy (HTTP polling + WebSocket) ───
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5005;
        proxy_http_version 1.1;

        # REQUIRED for WebSocket upgrade
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout — WebSocket connections stay open
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── React SPA static files ────────────────────────────────
    root /var/www/zinda-learn/client/dist;
    index index.html;

    location / {
        # Try to serve static file first; if not found, fallback to index.html
        # This is REQUIRED for React Router (client-side routing)
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Disable access log for healthcheck spam ───────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:5005;
        access_log off;
    }

    # ── Block dotfiles (.env, .git, etc.) ────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
